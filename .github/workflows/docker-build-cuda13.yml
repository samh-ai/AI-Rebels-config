name: Build and Push Docker Image (CUDA 13)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docker/Dockerfile.cuda13'
      - 'docker/boot.sh'
      - '.github/workflows/docker-build-cuda13.yml'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.cuda13
          push: true
          tags: airebels/comfyui:cuda13.0